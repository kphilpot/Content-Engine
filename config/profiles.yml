# Content Engine - Profile Configuration
# Define your social media profiles and their settings here

profiles:
  - profile_id: personal_product_main
    channel_name: Hair Product Channel
    mode: personal_product
    niche: hair
    active_platforms:
      - tiktok
      - instagram
      - facebook
      - youtube

    # Content Strategy
    content_pillars:
      - product_benefits
      - user_transformations
      - ingredient_education
      - lifestyle_integration

    tone: warm-educational
    research_focus:
      - hair_loss_solutions
      - natural_ingredients
      - product_reviews
      - beauty_trends

    # Posting Schedule
    posting_frequency:
      tiktok: 5
      youtube: 5
      instagram: 4
      facebook: 4

    # Content Ratios
    content_ratios:
      growth: 25
      trust: 20
      proof: 20
      conversion: 20
      fluff: 15

    # CTA Settings
    cta_intensity: medium
    active_product_name: Hair Renewal Pro
    active_product_url: https://yourproduct.com/hair-renewal
    affiliate_url: https://affiliate.link/hair-renewal

    # Plugin Settings
    plugin_enabled: false
    plugin_id: null
    plugin_url: null

    # Approval & Quality
    approval_mode: auto
    smart_approval_enabled: true

    # Budget Allocation
    budget_weight: 40

    # Enable/Disable
    enabled: true

